server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets generated by Vite are fingerprinted and can be cached long-term.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    include /etc/nginx/mime.types;

    types {
        application/javascript js mjs;
        text/css css;
        text/html html htm;
        application/wasm wasm;
        application/json json;
        image/svg+xml svg;
    }

    # Serve app entry point without long caching so deployments are picked up quickly.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }


    location ~* \.(?:js|mjs|css|wasm|json|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}